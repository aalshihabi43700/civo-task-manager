name: Backend STG Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "helm/task-manager/backend-stg.yaml"

permissions:
  contents: write

jobs:
  backend-stg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build backend image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/task-backend:${{ github.sha }} ./backend

      - name: Push backend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/task-backend:${{ github.sha }}

      - name: Update backend STG Helm values
        run: |
          sed -i "s/tag: .*/tag: \"${{ github.sha }}\"/" helm/task-manager/backend-stg.yaml

      - name: Commit and push backend STG changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add helm/task-manager/backend-stg.yaml
          git commit -m "Update backend STG image tag to ${{ github.sha }}" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main