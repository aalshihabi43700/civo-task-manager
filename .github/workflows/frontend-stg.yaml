name: Frontend STG Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "helm/task-manager/frontend-stg.yaml"

permissions:
  contents: write

jobs:
  frontend-stg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build frontend image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/task-frontend:${{ github.sha }} ./frontend

      - name: Push frontend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/task-frontend:${{ github.sha }}

      - name: Update frontend STG Helm values
        run: |
          sed -i "s/tag: .*/tag: \"${{ github.sha }}\"/" helm/task-manager/frontend-stg.yaml

      - name: Commit and push frontend STG changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add helm/task-manager/frontend-stg.yaml
          git commit -m "Update frontend STG image tag to ${{ github.sha }}" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main